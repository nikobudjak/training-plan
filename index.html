<!DOCTYPE html>
<html lang="en">
<head>

<title>Training Plan</title>
<style>
:root{--bg:#050505;--card:#101827;--card2:#0b1120;--cyan:#00f5ff;--pink:#ff2bd6;--green:#39ff14;--yellow:#facc15;--orange:#ff8c00;--text:#f8fafc;--muted:#94a3b8;--line:#334155}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#172554,#050505 60%);color:var(--text);font-family:Arial,sans-serif}.topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:16px 18px;border-bottom:1px solid var(--cyan);position:sticky;top:0;background:rgba(5,5,5,.92);backdrop-filter:blur(8px);z-index:5}.identity h1{margin:0;color:var(--cyan);text-shadow:0 0 14px var(--cyan);font-size:24px}.identity p{margin:4px 0;color:var(--muted)}.top-actions,.bottom-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}.bottom-actions{position:fixed;right:18px;bottom:18px;z-index:8}.layout{display:grid;grid-template-columns:350px 1fr;gap:18px;padding:18px 18px 90px}.card{background:linear-gradient(145deg,var(--card),var(--card2));border:1px solid rgba(0,245,255,.35);border-radius:16px;padding:18px;box-shadow:0 0 24px rgba(0,245,255,.08)}button,select,input,textarea{background:#0f172a;color:var(--text);border:1px solid var(--cyan);border-radius:8px;padding:9px}button{cursor:pointer;box-shadow:0 0 8px rgba(0,245,255,.25)}button:hover{border-color:var(--pink);box-shadow:0 0 12px var(--pink)}select{width:100%;margin:8px 0 14px}.day-button{display:block;width:100%;text-align:left;margin-bottom:8px}.active{border-color:var(--green);color:var(--green)}.small{color:var(--muted);font-size:12px;line-height:1.45}.badge{display:inline-block;border:1px solid var(--green);color:var(--green);border-radius:999px;padding:4px 8px;margin-right:8px}.week-badge{display:inline-block;border:1px solid var(--cyan);color:var(--cyan);border-radius:999px;padding:4px 8px;margin:3px 6px 3px 0}.section-title{display:inline-block;padding:10px 14px;border-radius:12px;margin-top:22px}.section-title.warmup{color:var(--yellow);border:1px solid var(--cyan)}.section-title.main{color:var(--orange);border:1px solid var(--cyan)}.section-title.finisher{color:var(--pink);border:1px solid var(--pink)}.section-title.cooldown{color:var(--green);border:1px solid var(--green)}.compact-exercise-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(265px,1fr));gap:14px;margin-top:14px}.compact-exercise-card{border:1px solid var(--cyan);border-radius:14px;background:#050817;padding:12px;box-shadow:0 0 12px rgba(0,245,255,.12)}.compact-exercise-card h4{margin:0 0 8px;color:var(--cyan)}.exercise-desc{white-space:pre-wrap;color:#dbeafe;font-size:13px;line-height:1.45}.set-detail{border-top:1px solid var(--line);margin-top:10px;padding-top:10px}.detail-row{display:grid;grid-template-columns:110px 1fr;gap:8px;align-items:center;margin:6px 0}.detail-row span{color:var(--muted)}.detail-row input{width:100%}.compact-notes,.cooldown-box{width:100%;margin-top:8px}.cooldown-box{min-height:90px}.exercise-card-link{display:inline-block;margin-top:8px;color:var(--green);text-decoration:none}.coach-toggle{font-size:12px;padding:6px 8px;margin-top:8px}.coach-explanation{display:none;color:#dbeafe;font-size:13px;line-height:1.45;border-left:2px solid var(--green);padding-left:10px;margin-top:8px}.coach-explanation.open{display:block}.modal{position:fixed;inset:0;background:rgba(0,0,0,.78);display:flex;align-items:center;justify-content:center;z-index:20;padding:18px}.modal.hidden{display:none}.modal-card{max-width:900px;width:100%;max-height:88vh;overflow:auto}.modal-header{display:flex;justify-content:space-between;gap:12px;align-items:center}.week-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}.week-card{border:1px solid var(--cyan);border-radius:14px;padding:12px;background:#050817}.week-card h3{margin:0 0 8px;color:var(--cyan)}.week-card.active-week{border-color:var(--green);box-shadow:0 0 12px rgba(57,255,20,.25)}pre{white-space:pre-wrap;background:#020617;border:1px solid var(--line);padding:10px;border-radius:10px}.dashboard-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}.chart{height:190px;display:flex;align-items:end;gap:8px}.bar{background:linear-gradient(var(--cyan),var(--pink));border-radius:8px 8px 0 0;min-height:3px}.bar-label{font-size:11px;color:var(--muted);text-align:center;margin-top:5px}@media(max-width:850px){.layout{grid-template-columns:1fr}.topbar{flex-direction:column}.bottom-actions{left:18px;right:18px}.bottom-actions button{flex:1}}

<body>
<div class="topbar">
  <div class="identity">
    <h1>Training Plan</h1>
    <p id="subtitle"></p>
  </div>
  <div class="top-actions">
    <button type="button" onclick="openPlan()">Plan</button>
    <button type="button" onclick="openMetadata()">Client</button>
    <button type="button" onclick="openDashboard()">Dashboard</button>
    <button type="button" onclick="saveProgress()">Save</button>
    <button type="button" onclick="clearProgress()">Clear</button>
  </div>
</div>

<div class="layout">
  <aside class="card">
    <h2>Weeks</h2>
    <select id="weekSelect" onchange="selectWeek(Number(this.value))"></select>
    <div id="selectedWeekInfo" class="small"></div>
    <h2>Sessions</h2>
    <div id="dayList"></div>
  </aside>

  <main class="card">
    <h2 id="sessionTitle"></h2>
    <p id="sessionMeta" class="small"></p>
    <div id="sessionContent"></div>
  </main>
</div>

<div class="bottom-actions">
  <button type="button" onclick="previousSession()">Previous</button>
  <button type="button" onclick="nextSession()">Next</button>
</div>

<div id="planModal" class="modal hidden">
  <div class="card modal-card">
    <div class="modal-header">
      <h2>12 Week Plan</h2>
      <button type="button" onclick="closePlan()">Close</button>
    </div>
    <p class="small">Click a week to jump to it, or use the drop-down menu in the sidebar.</p>
    <div id="planContent" class="week-grid"></div>
  </div>
</div>

<div id="metadataModal" class="modal hidden">
  <div class="card modal-card">
    <div class="modal-header">
      <h2>Client Metadata</h2>
      <button type="button" onclick="closeMetadata()">Close</button>
    </div>
    <div id="metadataContent"></div>
  </div>
</div>

<div id="dashboardModal" class="modal hidden">
  <div class="card modal-card">
    <div class="modal-header">
      <h2>Dashboard</h2>
      <button type="button" onclick="closeDashboard()">Close</button>
    </div>
    <div id="dashboardContent"></div>
  </div>
</div>

<div id="exerciseExplanationModal" class="modal hidden">
  <div class="card modal-card">
    <div class="modal-header">
      <h2 id="exerciseExplanationTitle">Explanation</h2>
      <button type="button" onclick="closeExerciseExplanation()">Close</button>
    </div>
    <div id="exerciseExplanationContent"></div>
  </div>
</div>

<div id="exerciseExplanationModal" class="modal hidden">
  <div class="card modal-card">
    <div class="modal-header">
      <h2 id="exerciseExplanationTitle">Explanation</h2>
      <button type="button" onclick="closeExerciseExplanation()">Close</button>
    </div>

    <div id="exerciseExplanationContent"></div>
  </div>
</div>

ver the toes which in turn creates undue stress at the knee joint. If the machine is designed that way, either look for another machine or just make sure that when you start executing the exercise you stop going down once you hit the 90-degree angle. Using your quadriceps, extend your legs to the maximum as you exhale. Ensure that the rest of the body remains stationary on the seat. Pause a second on the contracted position. Slowly lower the weight back to the original position as you inhale, ensuring that you do not go past the 90-degree angle limit. Repeat for the recommended amount of times.", "video_url": "", "set_plan": [{"set": 1, "reps": "12-15", "weight": "65% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}, {"set": 2, "reps": "12-15", "weight": "65% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}, {"set": 3, "reps": "12-15", "weight": "65% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}], "sets": 3, "repetitions": "12-15", "planned_weight": "65% 1RM", "tempo": ""}, {"exercise": "Seated Leg Curl", "muscle_group": "hamstrings", "description": "Adjust the machine lever to fit your height and sit on the machine with your back against the back support pad. Place the back of lower leg on top of padded lever (just a few inches under the calves) and secure the lap pad against your thighs, just above the knees. Then grasp the side handles on the machine as you point your toes straight (or you can also use any of the other two stances) and ensure that the legs are fully straight right in front of you. This will be your starting position. As you exhale, pull the machine lever as far as possible to the back of your thighs by flexing at the knees. Keep your torso stationary at all times. Hold the contracted position for a second. Slowly return to the starting position as you breathe in. Repeat for the recommended amount of repetitions.", "video_url": "", "set_plan": [{"set": 1, "reps": " rting position as you breathe in. Repeat for the recommended amount of repetitions.", "video_url": "", "set_plan": [{"set": 1, "reps": "12-15", "weight": "65% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}, {"set": 2, "reps": "12-15", "weight": "65% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}, {"set": 3, "reps": "12-15", "weight": "65% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}], "sets": 3, "repetitions": "12-15", "planned_weight": "65% 1RM", "tempo": ""}, {"exercise": "Standing Calf Raises", "muscle_group": "calves", "description": "Adjust the padded lever of the calf raise machine to fit your height. Place your shoulders under the pads provided and position your toes facing forward (or using any of the two other positions described at the beginning of the chapter). The balls of your feet should be secured on top of the calf block with the heels extending off it. Push the lever up by extending your hips and knees until your torso is standing erect. The knees should be kept with a slight bend; never locked. Toes should be facing forward, outwards or inwards as described at the beginning of the chapter. This will be your starting position. Raise your heels as you breathe out by extending your ankles as high as possible and flexing your calf. Ensure that the knee is kept stationary at all times. There should be no bending at any time. Hold the contracted position by a second before you start to go back down. Go back slowly to the starting position as you breathe in by lowering your heels as you bend the ankles until calves are stretched. Repeat for the recommended amount of repetitions.", "video_url": "", "set_plan": [{"set": 1, "reps": "12-15", "weight": "70% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}, {"set": 2, "reps": "12-15", "weight": "70% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}, {"set": 3, "reps": "12 edium stance described above which targets overall development; however you can choose any of the three stances discussed in the foot stances section. Begin to slowly lower your torso by bending the knees as you maintain a straight posture with the head up. Continue down until your thighs are parallel to the floor. Tip: If you performed the exercise correctly, the front of the knees should make an imaginary straight line with the toes that is perpendicular to the front. If your knees are past that imaginary line (if they are past your toes) then you are placing undue stress on the knee and the exercise has been performed incorrectly. Begin to raise your torso as you exhale by pushing the floor with the heel of your foot mainly as you straighten the legs again and go back to the starting position. Repeat for the recommended amount of repetitions.", "video_url": "", "set_plan": [{"set": 1, "reps": "10", "weight": "30-50% 1RM", "eccentric": "2", "static": "0", "concentric": "2", "tempo": "2-0-2"}, {"set": 2, "reps": "10", "weight": "30-50% 1RM", "eccentric": "2", "static": "0", "concentric": "2", "tempo": "2-0-2"}], "sets": 2, "repetitions": "10", "planned_weight": "30-50% 1RM", "tempo": ""}], "main_training": [{"exercise": "Barbell Deadlift", "muscle_group": "lower back + calves + forearms + glutes + hamstrings + lats + middle back + quadriceps + traps", "description": "Stand in front of a loaded barbell. While keeping the back as straight as possible, bend your knees, bend forward and grasp the bar using a medium (shoulder width) overhand grip. This will be the starting position of the exercise. Tip: If it is difficult to hold on to the bar with this grip, alternate your grip or use wrist straps. While holding the bar, start the lift by pushing with your legs while simultaneously getting your torso to the upright position as you breathe out. In the upright position, stick your chest out and contract the back by bringing the shoulder blades back. Think of how the soldiers in the military look when they are in standing in attention. Go back to the starting position by bending at the knees while simultaneously leaning the torso forward at the waist while keeping the back straight. When the weights on the bar touch the floor you are back at the starting position and ready to perform another repetition. Perform the amount of repetitions prescribed in the program.", "video_url": "", "set_plan": [{"set": 1, "reps": "8-10", "weight": "70% 1RM", "eccentric": "3", "static": "1", "concentric": "1", "tempo": "3-1-1"}, {"set": 2, "reps": "8-10", "weight": "70% 1RM", "eccentric": "3", "static": "1", "concentric": "1", "tempo": "3-1-1"}, {"set": 3, "reps": "8-10", "weight": "70% 1RM", "eccentric": "3", "static": "1", "concentric": "1", "tempo": "3-1-1"}, {"set": 4, "reps": "8-10", "weight": "70% 1RM", "eccentric": "3", "static": "1", "concentric": "1", "tempo": "3-1-1"}], "sets": 4, "repetitions": "8-10", "planned_weight": "70% 1RM", "tempo": ""}, {"exercise": "Barbell Glute Bridge", "muscle_group": "glutes + calves + hamstrings", "description": "Begin seated on the ground with a loaded barbell over your legs. Using a fat bar or having a pad on the bar can greatly reduce the discomfort caused by this exercise. Roll the bar so that it is directly above your hips, and lay down flat on the floor. Begin the movement by driving through with your heels, extending your hips vertically through the bar. Your weight should be supported by your upper back and the heels of your feet. Extend as far as possible, then reverse the motion to return to the starting position.", "video_url": "", "set_plan": [{"set": 1, "reps": "8-10", "weight": "70% 1RM", "eccentric": "3", "static": "1", "concentric": "1", "tempo": "3-1-1"}, {"set": 2, "reps": "8-10", "weight": "70% 1RM", "eccentric": "3", "static": "1", "concentric": "1", "tempo": "3-1-1"}, {"set": 3, "reps": "8-10", "weight": "70% 1RM", "eccentric": "3", "static": "1", "concentric": "1", "tempo": "3-1-1"}, {"set": 4, "reps": "8-10", "weight": "70% 1RM", "eccentric": "3", "static": "1", "concentric": "1", "tempo": "3-1-1"}], "sets": 4, "repetitions": "8-10", "planned_weight": "70% 1RM", "tempo": ""}, {"exercise": "Reverse Barbell Preacher Curls", "muscle_group": "biceps + forearms", "description": "Grab an EZ-bar using a shoulder width and palms down (pronated) grip. Now place the upper part of both arms on top of the preacher bench and have your arms extended. This will be your starting position. As you exhale, use the biceps to curl the weight up until your biceps are fully contracted and the barbell is at shoulder height. Squeeze the biceps hard for a second at the contracted position. As you breathe in, slowly lower the barbell until your upper arms are extended and the biceps is fully stretched. Repeat for the recommended amount of repetitions.", "video_url": "", "set_plan": [{"set": 1, "reps": "12-15", "weight": "65% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}, {"set": 2, "reps": "12-15", "weight": "65% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}, {"set": 3, "reps": "12-15", "weight": "65% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}], "sets": 3, "repetitions": "12-15", "planned_weight": "65% 1RM", "tempo": ""}, {"exercise": "Leg Extensions", "muscle_group": "quadriceps", "description": "For this exercise you will need to use a leg extension machine. First choose your weight and sit on the machine with your legs under the pad (feet pointed forward) and the hands holding the side bars. This will be your starting position. Tip: You will need to adjust the pad so that it falls on top of your lower leg (just above your feet). Also, make sure that your legs form a 90-degree angle between the lower and upper leg. If the angle is less than 90-degrees then that means the knee is over the toes which in turn creates undue stress at the knee joint. If the machine is designed that way, either look for another machine or just make sure that when you start executing the exercise you stop going down once you hit the 90-degree angle. Using your quadriceps, extend your legs to the maximum as you exhale. Ensure that the rest of the body remains stationary on the seat. Pause a second on the contracted position. Slowly lower the weight back to the original position as you inhale, ensuring that you do not go past the 90-degree angle limit. Repeat for the recommended amount of times.", "video_url": "", "set_plan": [{"set": 1, "reps": "12-15", "weight": "65% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}, {"set": 2, "reps": "12-15", "weight": "65% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}, {"set": 3, "reps": "12-15", "weight": "65% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}], "sets": 3, "repetitions": "12-15", "planned_weight": "65% 1RM", "tempo": ""}, {"exercise": "Front Leg Raises", "muscle_group": "hamstrings", "description": "Stand next to a chair or other support, holding on with one hand. Swing your leg forward, keeping the leg straight. Continue with a downward swing, bringing the leg as far back as your flexibility allows. Repeat 5-10 times, and then switch legs.", "video_url": "", "set_plan": [{"set": 1, "reps": "12-15", "weight": "70% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}, {"set": 2, "reps": "12-15", "weight": "70% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}, {"set": 3, "reps": "12-15", "weight": "70% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}, {"set": 4, "reps": "12-15", "weight": "70% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}], "sets": 4, "repetitions": "12-15", "planned_weight": "70% 1RM", "tempo": ""}], "finisher": [{"exercise": "Front Plank", "muscle_group": "Abdominals + Obliques + Lower Back + Shoulders + Glute r torso is standing erect. The knees should be kept with a slight bend; never locked. Toes should be facing forward, outwards or inwards as described at the beginning of the chapter. This will be your starting position. Raise your heels as you breathe out by extending your ankles as high as possible and flexing your calf. Ensure that the knee is kept stationary at all times. There should be no bending at any time. Hold the contracted position by a second before you start to go back down. Go back slowly to the starting position as you breathe in by lowering your heels as you bend the ankles until calves are stretched. Repeat for the recommended amount of repetitions.", "video_url": "", "set_plan": [{"set": 1, "reps": "12-15", "weight": "70% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}, {"set": 2, "reps": "12-15", "weight": "70% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}, {"set": 3, "reps": "12-15", "weight": "70% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}, {"set": 4, "reps": "12-15", "weight": "70% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}], "sets": 4, "repetitions": "12-15", "planned_weight": "70% 1RM", "tempo": ""}], "finisher": [{"exercise": "Barbell Lunge", "muscle_group": "quadriceps + calves + glutes + hamstrings", "description": "This exercise is best performed inside a squat rack for safety purposes. To begin, first set the bar on a rack just below shoulder level. Once the correct height is chosen and the bar is loaded, step under the bar and place the back of your shoulders (slightly below the neck) across it. Hold on to the bar using both arms at each side and lift it off the rack by first pushing with your legs and at the same time straightening your torso. Step away from the rack and step forward with your right leg and squat down through your hips, while keeping the torso upright and maintaining balance. Inhale as you go down ": "Hip Flexors + Hamstrings + Glutes", "description": "Stand next to a wall for balance. Swing one leg forward and backward in a controlled motion. Keep your torso upright. Repeat on the opposite leg.", "video_url": "", "set_plan": [{"set": 1, "reps": "10 each leg", "weight": "Bodyweight", "eccentric": "2", "static": "0", "concentric": "2", "tempo": "2-0-2"}], "sets": 1, "repetitions": "10 each leg", "planned_weight": "Bodyweight", "tempo": ""}, {"exercise": "Dumbbell Squat", "muscle_group": "quadriceps + calves + glutes + hamstrings + lower back", "description": "Stand up straight while holding a dumbbell on each hand (palms facing the side of your legs). Position your legs using a shoulder width medium stance with the toes slightly pointed out. Keep your head up at all times as looking down will get you off balance and also maintain a straight back. This will be your starting position. Note: For the purposes of this discussion we will use the medium stance described above which targets overall development; however you can choose any of the three stances discussed in the foot stances section. Begin to slowly lower your torso by bending the knees as you maintain a straight posture with the head up. Continue down until your thighs are parallel to the floor. Tip: If you performed the exercise correctly, the front of the knees should make an imaginary straight line with the toes that is perpendicular to the front. If your knees are past that imaginary line (if they are past your toes) then you are placing undue stress on the knee and the exercise has been performed incorrectly. Begin to raise your torso as you exhale by pushing the floor with the heel of your foot mainly as you straighten the legs again and go back to the starting position. Repeat for the recommended amount of repetitions.", "video_url": "", "set_plan": [{"set": 1, "reps": "10", "weight": "30-50% 1RM", "eccentric": "2", "static": "0", "concentric": "2", "tempo": "2-0-2"}, {"set": 2, "reps": "10", "weight": "30-50% 1RM", "eccentric": "2", "static": "0", "concentric": "2", "tempo": "2-0-2"}], "sets": 2, "repetitions": "10", "planned_weight": "30-50% 1RM", "tempo": ""}], "main_training": [{"exercise": "Barbell Deadlift", "muscle_group": "lower back + calves + forearms + glutes + hamstrings + lats + middle back + quadriceps + traps", "description": "Stand in front of a loaded barbell. While keeping the back as straight as possible, bend your knees, bend forward and grasp the bar using a medium (shoulder width) overhand grip. This will be the starting position of the exercise. Tip: If it is difficult to hold on to the bar with this grip, alternate your grip or use wrist straps. While holding the bar, start the lift by pushing with your legs while simultaneously getting your torso to the upright position as you breathe out. In the upright position, stick your chest out and contract the back by bringing the shoulder blades back. Think of how the soldiers in the military look when they are in standing in attention. Go back to the starting position by bending at the knees while simultaneously leaning the torso forward at the waist while keeping the back straight. When the weights on the bar touch the floor you are back at the starting position and ready to perform another repetition. Perform the amount of repetitions prescribed in the program.", "video_url": "", "set_plan": [{"set": 1, "reps": "8-10", "weight": "70% 1RM", "eccentric": "3", "static": "1", "concentric": "1", "tempo": "3-1-1"}, {"set": 2, "reps": "8-10", "weight": "70% 1RM", "eccentric": "3", "static": "1", "concentric": "1", "tempo": "3-1-1"}, {"set": 3, "reps": "8-10", "weight": "70% 1RM", "eccentric": "3", "static": "1", "concentric": "1", "tempo": "3-1-1"}, {"set": 4, "reps": "8-10", "weight": "70% 1RM", "eccentric": "3", "static": "1", "concentric": "1", "tempo": "3-1-1"}], "sets": 4, "repetitions": "8-10", "planned_weight": "70% 1RM", "tempo": ""}, {"exercise": "Barbell Glute Bridge", "muscle_group": f repetitions.", "video_url": "", "set_plan": [{"set": 1, "reps": "12-15", "weight": "65% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}, {"set": 2, "reps": "12-15", "weight": "65% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}, {"set": 3, "reps": "12-15", "weight": "65% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}], "sets": 3, "repetitions": "12-15", "planned_weight": "65% 1RM", "tempo": ""}, {"exercise": "Standing Calf Raises", "muscle_group": "calves", "description": "Adjust the padded lever of the calf raise machine to fit your height. Place your shoulders under the pads provided and position your toes facing forward (or using any of the two other positions described at the beginning of the chapter). The balls of your feet should be secured on top of the calf block with the heels extending off it. Push the lever up by extending your hips and knees until your torso is standing erect. The knees should be kept with a slight bend; never locked. Toes should be facing forward, outwards or inwards as described at the beginning of the chapter. This will be your starting position. Raise your heels as you breathe out by extending your ankles as high as possible and flexing your calf. Ensure that the knee is kept stationary at all times. There should be no bending at any time. Hold the contracted position by a second before you start to go back down. Go back slowly to the starting position as you breathe in by lowering your heels as you bend the ankles until calves are stretched. Repeat for the recommended amount of repetitions.", "video_url": "", "set_plan": [{"set": 1, "reps": "12-15", "weight": "70% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}, {"set": 2, "reps": "12-15", "weight": "70% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}, {"set": 3, "reps": "12-15", "weight": "70% 1RM", "eccentric": "2", "static": "1", "concentr ing all the way around until you are back where you started.", "video_url": "", "set_plan": [{"set": 1, "reps": "10", "weight": "Bodyweight", "eccentric": "2", "static": "0", "concentric": "2", "tempo": "2-0-2"}], "sets": 1, "repetitions": "10", "planned_weight": "Bodyweight", "tempo": ""}], "main_training": [{"exercise": "Barbell Bench Press", "muscle_group": "Chest + Triceps + Front Deltoids", "description": "Lie on a flat bench with your feet firmly on the floor. Grip the bar slightly wider than shoulder width. Lower the bar under control to the middle of your chest. Press the bar upward until your arms are extended. Keep your shoulder blades retracted during the movement.", "video_url": "", "set_plan": [{"set": 1, "reps": "8-10", "weight": "70% 1RM", "eccentric": "3", "static": "1", "concentric": "1", "tempo": "3-1-1"}, {"set": 2, "reps": "8-10", "weight": "70% 1RM", "eccentric": "3", "static": "1", "concentric": "1", "tempo": "3-1-1"}, {"set": 3, "reps": "8-10", "weight": "70% 1RM", "eccentric": "3", "static": "1", "concentric": "1", "tempo": "3-1-1"}, {"set": 4, "reps": "8-10", "weight": "70% 1RM", "eccentric": "3", "static": "1", "concentric": "1", "tempo": "3-1-1"}], "sets": 4, "repetitions": "8-10", "planned_weight": "70% 1RM", "tempo": ""}, {"exercise": "Wide-Grip Rear Pull-Up", "muscle_group": "lats + biceps + middle back + shoulders", "description": "Grab the pull-up bar with the palms facing forward using a wide grip. As you have both arms extended in front of you holding the bar, bring your torso forward and head so that there is an imaginary line from the pull-up bar to the back of your neck. This is your starting position. Pull your torso up until the bar is near the back of your neck. To do this, draw the shoulders and upper arms down and back while slightly leaning your head forward. Exhale as you perform this portion of the movement. Tip: Concentrate on squeezing the back muscles once you reach the full contracted position. The upper torso should petitions and then perform with the left leg.", "video_url": "", "set_plan": [{"set": 1, "reps": "12 each leg", "weight": "Bodyweight or light load", "eccentric": "2", "static": "0", "concentric": "2", "tempo": "2-0-2"}, {"set": 2, "reps": "12 each leg", "weight": "Bodyweight or light load", "eccentric": "2", "static": "0", "concentric": "2", "tempo": "2-0-2"}], "sets": 2, "repetitions": "12 each leg", "planned_weight": "Bodyweight or light load", "tempo": ""}, {"exercise": "Plank", "muscle_group": "abdominals", "description": "Get into a prone position on the floor, supporting your weight on your toes and your forearms. Your arms are bent and directly below the shoulder. Keep your body straight at all times, and hold this position as long as possible. To increase difficulty, an arm or leg can be raised.", "video_url": "", "set_plan": [{"set": 1, "reps": "30-60 sec", "weight": "Bodyweight", "eccentric": "", "static": "30-60", "concentric": "", "tempo": ""}, {"set": 2, "reps": "30-60 sec", "weight": "Bodyweight", "eccentric": "", "static": "30-60", "concentric": "", "tempo": ""}], "sets": 2, "repetitions": "30-60 sec", "planned_weight": "Bodyweight", "tempo": ""}], "cooldown": "Cool-down on a mat: light stretching and breathing for 5-10 minutes."}, {"date": "2026-08-11", "name": "Tuesday", "type": "Weights", "focus": "Upper Body A - Chest and Triceps Emphasis", "phase": "Hypertrophy", "weekly_goal": "High-quality volume for chest, biceps and triceps.", "intensity": "80% 1RM", "warmup": [{"exercise": "Rowing, Stationary", "muscle_group": "quadriceps + biceps + calves + glutes + hamstrings + lower back + middle back", "description": "To begin, seat yourself on the rower. Make sure that your heels are resting comfortably against the base of the foot pedals and that the straps are secured. Select the program that you wish to use, if applicable. Sit up straight and bend forward at the hips. There are three phases of movement when using a rower. The first phase is when you come forward on the rower. Your knees are bent and against your chest. Your upper body is leaning slightly forward while still maintaining good posture. Next, push against the foot pedals and extend your legs while bringing your hands to your upper abdominal area, squeezing your shoulders back as you do so. To avoid straining your back, use primarily your leg and hip muscles. The recovery phase simply involves straightening your arms, bending the knees, and bringing your body forward again as you transition back into the first phase.", "video_url": "", "set_plan": [{"set": 1, "reps": "~5 min", "weight": "", "eccentric": "", "static": "", "concentric": "", "tempo": ""}], "sets": 1, "repetitions": "~5 min", "planned_weight": "", "tempo": ""}, {"exercise": "Band Pull Apart", "muscle_group": "Shoulders + Upper Back + Rear Deltoids", "description": "Hold a resistance band in front of your chest with both hands. Keep your arms almost straight. Pull the band apart until your hands move out to the sides. Squeeze your shoulder blades together. Return slowly to the starting position.", "video_url": "", "set_plan": [{"set": 1, "reps": "15", "weight": "Light Band", "eccentric": "2", "static": "0", "concentric": "2", "tempo": "2-0-2"}, {"set": 2, "reps": "15", "weight": "Light Band", "eccentric": "2", "static": "0", "concentric": "2", "tempo": "2-0-2"}], "sets": 2, "repetitions": "15", "planned_weight": "Light Band", "tempo": ""}, {"exercise": "Arm Circles", "muscle_group": "Shoulders + Upper Back", "description": "Stand tall with your arms extended to the sides. Move your arms in small controlled circles. Gradually increase the circle size. Repeat in the opposite direction.", "video_url": "", "set_plan": [{"set": 1, "reps": "10 each direction", "weight": "Bodyweight", "eccentric": "2", "static": "0", "concentric": "2", "tempo": "2-0-2"}], "sets": 1, "repetitions": "10 each direction", "planned_weight": "Bodyweight", "tempo": ""}, {"exercise": "Clock Push-Up", "muscle_group": " "concentric": "2", "tempo": "2-0-2"}], "sets": 1, "repetitions": "10 each leg", "planned_weight": "Bodyweight", "tempo": ""}, {"exercise": "Dumbbell Squat", "muscle_group": "quadriceps + calves + glutes + hamstrings + lower back", "description": "Stand up straight while holding a dumbbell on each hand (palms facing the side of your legs). Position your legs using a shoulder width medium stance with the toes slightly pointed out. Keep your head up at all times as looking down will get you off balance and also maintain a straight back. This will be your starting position. Note: For the purposes of this discussion we will use the medium stance described above which targets overall development; however you can choose any of the three stances discussed in the foot stances section. Begin to slowly lower your torso by bending the knees as you maintain a straight posture with the head up. Continue down until your thighs are parallel to the floor. Tip: If you performed the exercise correctly, the front of the knees should make an imaginary straight line with the toes that is perpendicular to the front. If your knees are past that imaginary line (if they are past your toes) then you are placing undue stress on the knee and the exercise has been performed incorrectly. Begin to raise your torso as you exhale by pushing the floor with the heel of your foot mainly as you straighten the legs again and go back to the starting position. Repeat for the recommended amount of repetitions.", "video_url": "", "set_plan": [{"set": 1, "reps": "10", "weight": "30-50% 1RM", "eccentric": "2", "static": "0", "concentric": "2", "tempo": "2-0-2"}, {"set": 2, "reps": "10", "weight": "30-50% 1RM", "eccentric": "2", "static": "0", "concentric": "2", "tempo": "2-0-2"}], "sets": 2, "repetitions": "10", "planned_weight": "30-50% 1RM", "tempo": ""}], "main_training": [{"exercise": "Barbell Deadlift", "muscle_group": "lower back + calves + forearms + glutes + hamstrings + lats + middle back + quadriceps + traps", "description": "Stand in front of a loaded barbell. While keeping the back as straight as possible, bend your knees, bend forward and grasp the bar using a medium (shoulder width) overhand grip. This will be the starting position of the exercise. Tip: If it is difficult to hold on to the bar with this grip, alternate your grip or use wrist straps. While holding the bar, start the lift by pushing with your legs while simultaneously getting your torso to the upright position as you breathe out. In the upright position, stick your chest out and contract the back by bringing the shoulder blades back. Think of how the soldiers in the military look when they are in standing in attention. Go back to the starting position by bending at the knees while simultaneously leaning the torso forward at the waist while keeping the back straight. When the weights on the bar touch the floor you are back at the starting position and ready to perform another repetition. Perform the amount of repetitions prescribed in the program.", "video_url": "", "set_plan": [{"set": 1, "reps": "8-10", "weight": "70% 1RM", "eccentric": "3", "static": "1", "concentric": "1", "tempo": "3-1-1"}, {"set": 2, "reps": "8-10", "weight": "70% 1RM", "eccentric": "3", "static": "1", "concentric": "1", "tempo": "3-1-1"}, {"set": 3, "reps": "8-10", "weight": "70% 1RM", "eccentric": "3", "static": "1", "concentric": "1", "tempo": "3-1-1"}, {"set": 4, "reps": "8-10", "weight": "70% 1RM", "eccentric": "3", "static": "1", "concentric": "1", "tempo": "3-1-1"}], "sets": 4, "repetitions": "8-10", "planned_weight": "70% 1RM", "tempo": ""}, {"exercise": "Barbell Glute Bridge", "muscle_group": "glutes + calves + hamstrings", "description": "Begin seated on the ground with a loaded barbell over your legs. Using a fat bar or having a pad on the bar can greatly reduce the discomfort caused by this exercise. Roll the bar so that it is directly above your hips, and lay down flat on the floor. Begin the movement by dri po": "3-1-1"}], "sets": 4, "repetitions": "8-10", "planned_weight": "70% 1RM", "tempo": ""}, {"exercise": "Leg Extensions", "muscle_group": "quadriceps", "description": "For this exercise you will need to use a leg extension machine. First choose your weight and sit on the machine with your legs under the pad (feet pointed forward) and the hands holding the side bars. This will be your starting position. Tip: You will need to adjust the pad so that it falls on top of your lower leg (just above your feet). Also, make sure that your legs form a 90-degree angle between the lower and upper leg. If the angle is less than 90-degrees then that means the knee is over the toes which in turn creates undue stress at the knee joint. If the machine is designed that way, either look for another machine or just make sure that when you start executing the exercise you stop going down once you hit the 90-degree angle. Using your quadriceps, extend your legs to the maximum as you exhale. Ensure that the rest of the body remains stationary on the seat. Pause a second on the contracted position. Slowly lower the weight back to the original position as you inhale, ensuring that you do not go past the 90-degree angle limit. Repeat for the recommended amount of times.", "video_url": "", "set_plan": [{"set": 1, "reps": "12-15", "weight": "65% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}, {"set": 2, "reps": "12-15", "weight": "65% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}, {"set": 3, "reps": "12-15", "weight": "65% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}], "sets": 3, "repetitions": "12-15", "planned_weight": "65% 1RM", "tempo": ""}, {"exercise": "Seated Leg Curl", "muscle_group": "hamstrings", "description": "Adjust the machine lever to fit your height and sit on the machine with your back against the back support pad. Place the back of lower leg on top of padded lever (just a few inches under the calves) and secure the lap pad against your thighs, just above the knees. Then grasp the side handles on the machine as you point your toes straight (or you can also use any of the other two stances) and ensure that the legs are fully straight right in front of you. This will be your starting position. As you exhale, pull the machine lever as far as possible to the back of your thighs by flexing at the knees. Keep your torso stationary at all times. Hold the contracted position for a second. Slowly return to the starting position as you breathe in. Repeat for the recommended amount of repetitions.", "video_url": "", "set_plan": [{"set": 1, "reps": "12-15", "weight": "65% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}, {"set": 2, "reps": "12-15", "weight": "65% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}, {"set": 3, "reps": "12-15", "weight": "65% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}], "sets": 3, "repetitions": "12-15", "planned_weight": "65% 1RM", "tempo": ""}, {"exercise": "Standing Calf Raises", "muscle_group": "calves", "description": "Adjust the padded lever of the calf raise machine to fit your height. Place your shoulders under the pads provided and position your toes facing forward (or using any of the two other positions described at the beginning of the chapter). The balls of your feet should be secured on top of the calf block with the heels extending off it. Push the lever up by extending your hips and knees until your torso is standing erect. The knees should be kept with a slight bend; never locked. Toes should be facing forward, outwards or inwards as described at the beginning of the chapter. This will be your starting position. Raise your heels as you breathe out by extending your ankles as high as possible and flexing your calf. Ensure that the knee is kept stationary at all times. There should be no bending at any time. Hold the contracted position by a second before you start to go back down. Go back slowly to the starting position as you breathe in by lowering your heels as you bend the ankles until calves are stretched. Repeat for the recommended amount of repetitions.", "video_url": "", "set_plan": [{"set": 1, "reps": "12-15", "weight": "70% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}, {"set": 2, "reps": "12-15", "weight": "70% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}, {"set": 3, "reps": "12-15", "weight": "70% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}, {"set": 4, "reps": "12-15", "weight": "70% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}], "sets": 4, "repetitions": "12-15", "planned_weight": "70% 1RM", "tempo": ""}], "finisher": [{"exercise": "Barbell Lunge", "muscle_group": "quadriceps + calves + glutes + hamstrings", "description": "This exercise is best performed inside a squat rack for safety purposes. To begin, first set the bar on a rack just below shoulder level. Once the correct height is chosen and the bar is loaded, step under the bar and place the back of your shoulders (slightly below the neck) across it. Hold on to the bar using both arms at each side and lift it off the rack by first pushing with your legs and at the same time straightening your torso. Step away from the rack and step forward with your right leg and squat down through your hips, while keeping the torso upright and maintaining balance. Inhale as you go down. Note: Do not allow your knee to go forward beyond your toes as you come down, as this will put undue stress on the knee joint. li> Using mainly the heel of your foot, push up and go back to the starting position as you exhale. Repeat the movement for the recommended amount of repetitions and then perform with the left leg.", "video_url": "", "set_plan": [{"set": 1, "reps": "12 each leg", "weight": "Bodyweight or light load", "eccentric hing and breathing for 5-10 minutes."}, {"date": "2026-08-28", "name": "Friday", "type": "Weights", "focus": "Lower Body B - Posterior Chain Emphasis", "phase": "Hypertrophy", "weekly_goal": "Final high-volume hypertrophy week before strength-emphasis block.", "intensity": "82.5% 1RM", "warmup": [{"exercise": "Rowing, Stationary", "muscle_group": "quadriceps + biceps + calves + glutes + hamstrings + lower back + middle back", "description": "To begin, seat yourself on the rower. Make sure that your heels are resting comfortably against the base of the foot pedals and that the straps are secured. Select the program that you wish to use, if applicable. Sit up straight and bend forward at the hips. There are three phases of movement when using a rower. The first phase is when you come forward on the rower. Your knees are bent and against your chest. Your upper body is leaning slightly forward while still maintaining good posture. Next, push against the foot pedals and extend your legs while bringing your hands to your upper abdominal area, squeezing your shoulders back as you do so. To avoid straining your back, use primarily your leg and hip muscles. The recovery phase simply involves straightening your arms, bending the knees, and bringing your body forward again as you transition back into the first phase.", "video_url": "", "set_plan": [{"set": 1, "reps": "~5 min", "weight": "", "eccentric": "", "static": "", "concentric": "", "tempo": ""}], "sets": 1, "repetitions": "~5 min", "planned_weight": "", "tempo": ""}, {"exercise": "Dynamic Leg Swings", "muscle_group": "Hip Flexors + Hamstrings + Glutes", "description": "Stand next to a wall for balance. Swing one leg forward and backward in a controlled motion. Keep your torso upright. Repeat on the opposite leg.", "video_url": "", "set_plan": [{"set": 1, "reps": "10 each leg", "weight": "Bodyweight", "eccentric": "2", "static": "0", "concentric": "2", "tempo": "2-0-2"}], "sets": 1, "repetitions": "10 each leg", "planned_weight": "Bodyweight", "tempo": ""}, {"exercise": "Dumbbell Squat", "muscle_group": "quadriceps + calves + glutes + hamstrings + lower back", "description": "Stand up straight while holding a dumbbell on each hand (palms facing the side of your legs). Position your legs using a shoulder width medium stance with the toes slightly pointed out. Keep your head up at all times as looking down will get you off balance and also maintain a straight back. This will be your starting position. Note: For the purposes of this discussion we will use the medium stance described above which targets overall development; however you can choose any of the three stances discussed in the foot stances section. Begin to slowly lower your torso by bending the knees as you maintain a straight posture with the head up. Continue down until your thighs are parallel to the floor. Tip: If you performed the exercise correctly, the front of the knees should make an imaginary straight line with the toes that is perpendicular to the front. If your knees are past that imaginary line (if they are past your toes) then you are placing undue stress on the knee and the exercise has been performed incorrectly. Begin to raise your torso as you exhale by pushing the floor with the heel of your foot mainly as you straighten the legs again and go back to the starting position. Repeat for the recommended amount of repetitions.", "video_url": "", "set_plan": [{"set": 1, "reps": "10", "weight": "30-50% 1RM", "eccentric": "2", "static": "0", "concentric": "2", "tempo": "2-0-2"}, {"set": 2, "reps": "10", "weight": "30-50% 1RM", "eccentric": "2", "static": "0", "concentric": "2", "tempo": "2-0-2"}], "sets": 2, "repetitions": "10", "planned_weight": "30-50% 1RM", "tempo": ""}], "main_training": [{"exercise": "Barbell Deadlift", "muscle_group": "lower back + calves + forearms + glutes + hamstrings + lats + middle back + quadriceps + traps", "description": "Stand in front of a loaded barbell. While keeping the back as straight as possible, bend your knees, bend forward and grasp the bar using a medium (shoulder width) overhand grip. This will be the starting position of the exercise. Tip: If it is difficult to hold on to the bar with this grip, alternate your grip or use wrist straps. While holding the bar, start the lift by pushing with your legs while simultaneously getting your torso to the upright position as you breathe out. In the upright position, stick your chest out and contract the back by bringing the shoulder blades back. Think of how the soldiers in the military look when they are in standing in attention. Go back to the starting position by bending at the knees while simultaneously leaning the torso forward at the waist while keeping the back straight. When the weights on the bar touch the floor you are back at the starting position and ready to perform another repetition. Perform the amount of repetitions prescribed in the program.", "video_url": "", "set_plan": [{"set": 1, "reps": "8-10", "weight": "70% 1RM", "eccentric": "3", "static": "1", "concentric": "1", "tempo": "3-1-1"}, {"set": 2, "reps": "8-10", "weight": "70% 1RM", "eccentric": "3", "static": "1", "concentric": "1", "tempo": "3-1-1"}, {"set": 3, "reps": "8-10", "weight": "70% 1RM", "eccentric": "3", "static": "1", "concentric": "1", "tempo": "3-1-1"}, {"set": 4, "reps": "8-10", "weight": "70% 1RM", "eccentric": "3", "static": "1", "concentric": "1", "tempo": "3-1-1"}], "sets": 4, "repetitions": "8-10", "planned_weight": "70% 1RM", "tempo": ""}, {"exercise": "Barbell Glute Bridge", "muscle_group": "glutes + calves + hamstrings", "description": "Begin seated on the ground with a loaded barbell over your legs. Using a fat bar or having a pad on the bar can greatly reduce the discomfort caused by this exercise. Roll the bar so that it is directly above your hips, and lay down flat on the floor. Begin the movement by driving through with your heels, extending your hips vertically through the bar. Your weigh ension machine. First choose your weight and sit on the machine with your legs under the pad (feet pointed forward) and the hands holding the side bars. This will be your starting position. Tip: You will need to adjust the pad so that it falls on top of your lower leg (just above your feet). Also, make sure that your legs form a 90-degree angle between the lower and upper leg. If the angle is less than 90-degrees then that means the knee is over the toes which in turn creates undue stress at the knee joint. If the machine is designed that way, either look for another machine or just make sure that when you start executing the exercise you stop going down once you hit the 90-degree angle. Using your quadriceps, extend your legs to the maximum as you exhale. Ensure that the rest of the body remains stationary on the seat. Pause a second on the contracted position. Slowly lower the weight back to the original position as you inhale, ensuring that you do not go past the 90-degree angle limit. Repeat for the recommended amount of times.", "video_url": "", "set_plan": [{"set": 1, "reps": "12-15", "weight": "65% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}, {"set": 2, "reps": "12-15", "weight": "65% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}, {"set": 3, "reps": "12-15", "weight": "65% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}], "sets": 3, "repetitions": "12-15", "planned_weight": "65% 1RM", "tempo": ""}, {"exercise": "Front Leg Raises", "muscle_group": "hamstrings", "description": "Stand next to a chair or other support, holding on with one hand. Swing your leg forward, keeping the leg straight. Continue with a downward swing, bringing the leg as far back as your flexibility allows. Repeat 5-10 times, and then switch legs.", "video_url": "", "set_plan": [{"set": 1, "reps": "12-15", "weight": "70% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}, {"se -10", "planned_weight": "70% 1RM", "tempo": ""}, {"exercise": "Barbell Glute Bridge", "muscle_group": "glutes + calves + hamstrings", "description": "Begin seated on the ground with a loaded barbell over your legs. Using a fat bar or having a pad on the bar can greatly reduce the discomfort caused by this exercise. Roll the bar so that it is directly above your hips, and lay down flat on the floor. Begin the movement by driving through with your heels, extending your hips vertically through the bar. Your weight should be supported by your upper back and the heels of your feet. Extend as far as possible, then reverse the motion to return to the starting position.", "video_url": "", "set_plan": [{"set": 1, "reps": "8-10", "weight": "70% 1RM", "eccentric": "3", "static": "1", "concentric": "1", "tempo": "3-1-1"}, {"set": 2, "reps": "8-10", "weight": "70% 1RM", "eccentric": "3", "static": "1", "concentric": "1", "tempo": "3-1-1"}, {"set": 3, "reps": "8-10", "weight": "70% 1RM", "eccentric": "3", "static": "1", "concentric": "1", "tempo": "3-1-1"}, {"set": 4, "reps": "8-10", "weight": "70% 1RM", "eccentric": "3", "static": "1", "concentric": "1", "tempo": "3-1-1"}], "sets": 4, "repetitions": "8-10", "planned_weight": "70% 1RM", "tempo": ""}, {"exercise": "Leg Extensions", "muscle_group": "quadriceps", "description": "For this exercise you will need to use a leg extension machine. First choose your weight and sit on the machine with your legs under the pad (feet pointed forward) and the hands holding the side bars. This will be your starting position. Tip: You will need to adjust the pad so that it falls on top of your lower leg (just above your feet). Also, make sure that your legs form a 90-degree angle between the lower and upper leg. If the angle is less than 90-degrees then that means the knee is over the toes which in turn creates undue stress at the knee joint. If the machine is designed that way, either look for another machine or just make sure that when you start executing the exercise you stop going down once you hit the 90-degree angle. Using your quadriceps, extend your legs to the maximum as you exhale. Ensure that the rest of the body remains stationary on the seat. Pause a second on the contracted position. Slowly lower the weight back to the original position as you inhale, ensuring that you do not go past the 90-degree angle limit. Repeat for the recommended amount of times.", "video_url": "", "set_plan": [{"set": 1, "reps": "12-15", "weight": "65% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}, {"set": 2, "reps": "12-15", "weight": "65% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}, {"set": 3, "reps": "12-15", "weight": "65% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}], "sets": 3, "repetitions": "12-15", "planned_weight": "65% 1RM", "tempo": ""}, {"exercise": "Seated Leg Curl", "muscle_group": "hamstrings", "description": "Adjust the machine lever to fit your height and sit on the machine with your back against the back support pad. Place the back of lower leg on top of padded lever (just a few inches under the calves) and secure the lap pad against your thighs, just above the knees. Then grasp the side handles on the machine as you point your toes straight (or you can also use any of the other two stances) and ensure that the legs are fully straight right in front of you. This will be your starting position. As you exhale, pull the machine lever as far as possible to the back of your thighs by flexing at the knees. Keep your torso stationary at all times. Hold the contracted position for a second. Slowly return to the starting position as you breathe in. Repeat for the recommended amount of repetitions.", "video_url": "", "set_plan": [{"set": 1, "reps": "12-15", "weight": "65% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}, {"set": 2, "reps": "12-15", "weight": "65% 1RM", "eccentric": "2", "stat : [{"exercise": "Barbell Lunge", "muscle_group": "quadriceps + calves + glutes + hamstrings", "description": "This exercise is best performed inside a squat rack for safety purposes. To begin, first set the bar on a rack just below shoulder level. Once the correct height is chosen and the bar is loaded, step under the bar and place the back of your shoulders (slightly below the neck) across it. Hold on to the bar using both arms at each side and lift it off the rack by first pushing with your legs and at the same time straightening your torso. Step away from the rack and step forward with your right leg and squat down through your hips, while keeping the torso upright and maintaining balance. Inhale as you go down. Note: Do not allow your knee to go forward beyond your toes as you come down, as this will put undue stress on the knee joint. li> Using mainly the heel of your foot, push up and go back to the starting position as you exhale. Repeat the movement for the recommended amount of repetitions and then perform with the left leg.", "video_url": "", "set_plan": [{"set": 1, "reps": "12 each leg", "weight": "Bodyweight or light load", "eccentric": "2", "static": "0", "concentric": "2", "tempo": "2-0-2"}, {"set": 2, "reps": "12 each leg", "weight": "Bodyweight or light load", "eccentric": "2", "static": "0", "concentric": "2", "tempo": "2-0-2"}], "sets": 2, "repetitions": "12 each leg", "planned_weight": "Bodyweight or light load", "tempo": ""}, {"exercise": "Plank", "muscle_group": "abdominals", "description": "Get into a prone position on the floor, supporting your weight on your toes and your forearms. Your arms are bent and directly below the shoulder. Keep your body straight at all times, and hold this position as long as possible. To increase difficulty, an arm or leg can be raised.", "video_url": "", "set_plan": [{"set": 1, "reps": "30-60 sec", "weight": "Bodyweight", "eccentric": "", "static": "30-60", "concentric": "", "tempo": ""}, {"set": 2, "reps": "30-6 ainst the base of the foot pedals and that the straps are secured. Select the program that you wish to use, if applicable. Sit up straight and bend forward at the hips. There are three phases of movement when using a rower. The first phase is when you come forward on the rower. Your knees are bent and against your chest. Your upper body is leaning slightly forward while still maintaining good posture. Next, push against the foot pedals and extend your legs while bringing your hands to your upper abdominal area, squeezing your shoulders back as you do so. To avoid straining your back, use primarily your leg and hip muscles. The recovery phase simply involves straightening your arms, bending the knees, and bringing your body forward again as you transition back into the first phase.", "video_url": "", "set_plan": [{"set": 1, "reps": "~5 min", "weight": "", "eccentric": "", "static": "", "concentric": "", "tempo": ""}], "sets": 1, "repetitions": "~5 min", "planned_weight": "", "tempo": ""}, {"exercise": "Dynamic Leg Swings", "muscle_group": "Hip Flexors + Hamstrings + Glutes", "description": "Stand next to a wall for balance. Swing one leg forward and backward in a controlled motion. Keep your torso upright. Repeat on the opposite leg.", "video_url": "", "set_plan": [{"set": 1, "reps": "10 each leg", "weight": "Bodyweight", "eccentric": "2", "static": "0", "concentric": "2", "tempo": "2-0-2"}], "sets": 1, "repetitions": "10 each leg", "planned_weight": "Bodyweight", "tempo": ""}, {"exercise": "Dumbbell Squat", "muscle_group": "quadriceps + calves + glutes + hamstrings + lower back", "description": "Stand up straight while holding a dumbbell on each hand (palms facing the side of your legs). Position your legs using a shoulder width medium stance with the toes slightly pointed out. Keep your head up at all times as looking down will get you off balance and also maintain a straight back. This will be your starting position. Note: For the purposes of this discussion we wi  (or using any of the two other positions described at the beginning of the chapter). The balls of your feet should be secured on top of the calf block with the heels extending off it. Push the lever up by extending your hips and knees until your torso is standing erect. The knees should be kept with a slight bend; never locked. Toes should be facing forward, outwards or inwards as described at the beginning of the chapter. This will be your starting position. Raise your heels as you breathe out by extending your ankles as high as possible and flexing your calf. Ensure that the knee is kept stationary at all times. There should be no bending at any time. Hold the contracted position by a second before you start to go back down. Go back slowly to the starting position as you breathe in by lowering your heels as you bend the ankles until calves are stretched. Repeat for the recommended amount of repetitions.", "video_url": "", "set_plan": [{"set": 1, "reps": "12-15", "weight": "70% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}, {"set": 2, "reps": "12-15", "weight": "70% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}, {"set": 3, "reps": "12-15", "weight": "70% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}, {"set": 4, "reps": "12-15", "weight": "70% 1RM", "eccentric": "2", "static": "1", "concentric": "2", "tempo": "2-1-2"}], "sets": 4, "repetitions": "12-15", "planned_weight": "70% 1RM", "tempo": ""}], "finisher": [{"exercise": "Barbell Lunge", "muscle_group": "quadriceps + calves + glutes + hamstrings", "description": "This exercise is best performed inside a squat rack for safety purposes. To begin, first set the bar on a rack just below shoulder level. Once the correct height is chosen and the bar is loaded, step under the bar and place the back of your shoulders (slightly below the neck) across it. Hold on to the bar using both arms at each side and lift it off the rack by firs   flatSessions=[];flatWeeks=[];
  (trainingData.months || []).forEach(month=>{
    (month.weeks || []).forEach(week=>{
      const weekSessionStart=flatSessions.length;
      const weekIndex=flatWeeks.length;
      const w={...week, month:month.month, weekIndex, sessionStart:weekSessionStart, sessionIndexes:[]};
      flatWeeks.push(w);
      (week.days || []).forEach(day=>{
        const session={...day, month:month.month, week:week.week, weekIndex, phase:day.phase || week.phase || "", weekly_goal:day.weekly_goal || week.goal || "", intensity:day.intensity || week.intensity || ""};
        flatSessions.push(session);
        w.sessionIndexes.push(flatSessions.length-1);
      });
    });
  });
}

function todayIndex(){
  const today=new Date().toISOString().slice(0,10);
  const exact=flatSessions.findIndex(s=>s.date===today);
  if(exact>=0)return exact;
  return 0;
}

function renderSubtitle(){
  const c=clientObject();
  const bits=[];
  if(c.age)bits.push(c.age+" years");
  if(c.height_cm)bits.push(c.height_cm+" cm");
  if(c.weight_kg)bits.push(c.weight_kg+" kg");
  const goal=c.goal || metadata.goal || "";
  document.getElementById("subtitle").textContent = clientName()+" | "+bits.join(" | ")+(goal ? " | "+goal : "");
}

function renderWeekSelect(){
  const select=document.getElementById("weekSelect");
  select.innerHTML=flatWeeks.map((w,i)=>`<option value="${i}">${escapeHtml(weekTitle(w))}</option>`).join("");
  select.value=String(selectedWeekIndex);
  renderSelectedWeekInfo();
}

function renderSelectedWeekInfo(){
  const w=flatWeeks[selectedWeekIndex];
  if(!w){document.getElementById("selectedWeekInfo").innerHTML="";return;}
  document.getElementById("selectedWeekInfo").innerHTML =
    `<span class="week-badge">${escapeHtml(w.phase || "Phase")}</span>`+
    `<span class="week-badge">${escapeHtml(w.intensity || "Intensity")}</span>`+
    `<p>${escapeHtml(w.goal || "")}</p>`;
}

function selectWeek(weekIndex){
  selectedWeekIndex=weekIndex;
  const w=flatWeeks[selectedWeekIndex];
  if(w && w.sessionIndexes.length){selectedIndex=w.sessionIndexes[0];}
  render();
}

function renderDayList(){
  const list=document.getElementById("dayList");
  const w=flatWeeks[selectedWeekIndex];
  if(!w){list.innerHTML="<p class='small'>No weeks available.</p>";return;}
  list.innerHTML=w.sessionIndexes.map(i=>{
    const s=flatSessions[i];
    const active=i===selectedIndex?" active":"";
    return `<button type="button" class="day-button${active}" onclick="selectedIndex=${i};selectedWeekIndex=${s.weekIndex};render()"><strong>${escapeHtml(s.name || "Day")}</strong><br><span class="small">${escapeHtml(s.focus || "")}<br>${escapeHtml(fmt(s.date))}</span></button>`;
  }).join("");
}

function openPlan(){renderPlan();document.getElementById("planModal").classList.remove("hidden");}
function closePlan(){document.getElementById("planModal").classList.add("hidden");}
function renderPlan(){
  const box=document.getElementById("planContent");
  box.innerHTML=`
    <div class="meso-plan">
      <h2>Mesoplanung über 12 Wochen</h2>
      <p>Hypertrophietraining für 10 Trainingswochen, danach für 2 Trainingswochen IK-Training.</p>

      <table class="meso-table">
        <thead>
          <tr>
            <th>Woche</th>
            ${flatWeeks.map((w,i)=>`
              <th><button type="button" class="week-number-btn" onclick="openWeekDetails(${i})">${w.week}</button></th>
            `).join("")}
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Hypertrophie</td>
            ${flatWeeks.map(w=>`<td>${w.week <= 10 ? "x" : ""}</td>`).join("")}
          </tr>
          <tr>
            <td>IK-Training</td>
            ${flatWeeks.map(w=>`<td>${w.week >= 11 ? "x" : ""}</td>`).join("")}
          </tr>
        </tbody>
      </table>

      <div class="meso-notes">
        <p><strong>Hypertrophie:</strong> Start mit 70% 1-RM, Steigerung im Trainingsverlauf bis 80% 1-RM</p>
        <p><strong>IK-Training:</strong> Start mit 90% 1-RM, Steigerung im Trainingsverlauf bis 95% 1-RM</p>
      </div>
    </div>`;
}

function openWeekDetails(weekIndex){
  const w=flatWeeks[weekIndex];
  if(!w)return;

  document.getElementById("exerciseExplanationTitle").textContent=weekTitle(w);
  document.getElementById("exerciseExplanationContent").innerHTML=
    `<p><strong>Phase:</strong> ${escapeHtml(w.phase || "")}</p>`+
    `<p><strong>Intensity:</strong> ${escapeHtml(w.intensity || "")}</p>`+
    `<p><strong>Goal:</strong> ${escapeHtml(w.goal || "")}</p>`+
    `<p><strong>Start:</strong> ${escapeHtml(w.start_date || "")}</p>`+
    `<button type="button" onclick="selectWeek(${weekIndex});closeExerciseExplanation();closePlan()">Open this week</button>`;

  document.getElementById("exerciseExplanationModal").classList.remove("hidden");
}

function closeExerciseExplanation(){
  document.getElementById("exerciseExplanationModal").classList.add("hidden");
}

function coachExplanationText(ex){
  const lines=[];
  if(ex.description)lines.push(ex.description);
  if(ex.muscle_group)lines.push("Main focus: "+ex.muscle_group+".");
  if(ex.intensity)lines.push("Intensity: "+ex.intensity+".");
  if(ex.exercise_library && ex.exercise_library.instructions && ex.exercise_library.instructions.length){
    lines.push("Instructions: "+ex.exercise_library.instructions.slice(0,3).join(" "));
  }
  return lines.join("\n") || "No coach explanation available yet.";
}

function renderExerciseCard(ex,section,idx){
  const name=exerciseKeyName(ex);
  const link=exerciseExternalUrl(ex);
  const detailId=`set-detail-${section}-${selectedIndex}-${idx}`;
  const setPlan=Array.isArray(ex.set_plan)&&ex.set_plan.length ? ex.set_plan : [{set:1,reps:ex.repetitions||"",weight:ex.planned_weight||""}];

  let html=`<div class="compact-exercise-card ${section}"><h4>${escapeHtml(name)}</h4>`;
  html+=`<p class="small">${escapeHtml(ex.muscle_group || "")} ${ex.tempo ? "| Tempo: "+escapeHtml(ex.tempo) : ""}</p>`;

  html+=`<button type="button" class="coach-toggle" onclick="openExerciseExplanation(flatSessions[${selectedIndex}].${section}[${idx}])">Explanation</button>`;

  html+=`<div class="set-control"><select onchange="renderSelectedSetDetail('${detailId}', flatSessions[${selectedIndex}].${section}[${idx}], '${section}', ${selectedIndex}, Number(this.value))">`;
  setPlan.forEach((sp,si)=>{html+=`<option value="${si}">Set ${escapeHtml(sp.set || si+1)}</option>`;});
  html+=`</select>`;

  if(link)html+=`<a class="exercise-card-link" target="_blank" href="${escapeHtml(link)}">Video / link</a>`;

  html+=`</div><div id="${detailId}" class="set-detail"></div>`;
  html+=`</div>`;

  setTimeout(()=>renderSelectedSetDetail(detailId,ex,section,selectedIndex,0),0);
  return html;
}

function openExerciseExplanation(ex){
  document.getElementById("exerciseExplanationTitle").textContent = exerciseKeyName(ex);
  document.getElementById("exerciseExplanationContent").innerHTML =
    `<p><strong>Muscle group:</strong> ${escapeHtml(ex.muscle_group || "")}</p>`+
    `<div class="exercise-desc">${escapeHtml(coachExplanationText(ex)).replaceAll("\n","<br>")}</div>`;

  document.getElementById("exerciseExplanationModal").classList.remove("hidden");
}

function closeExerciseExplanation(){
  document.getElementById("exerciseExplanationModal").classList.add("hidden");
}

function toggleCoachExplanation(btn){const box=btn.nextElementSibling;if(box)box.classList.toggle("open");}

function previousValue(name,setLabel,currentSessionIndex){
  for(let i=currentSessionIndex-1;i>=0;i--){
    for(const section of ["main_training","warmup","finisher"]){
      const list=flatSessions[i][section]||[];
      for(const ex of list){
        if(exerciseKeyName(ex)===name){
          const value=progress[key(i,section,name,setLabel)];
          if(value)return value;
        }
      }
    }
  }
  return "-";
}

function tempoValue(sp, ex){
  const eccentric = sp.eccentric || ex.eccentric || "";
  const staticPart = sp.static || ex.static || "";
  const concentric = sp.concentric || ex.concentric || "";

  if(sp.tempo) return sp.tempo;
  if(ex.tempo) return ex.tempo;
  if(eccentric || staticPart || concentric){
    return `${eccentric || "-"}-${staticPart || "-"}-${concentric || "-"}`;
  }
  return "";
}

function renderSelectedSetDetail(detailId, ex, section, sessionIndex, setIndex){
  const box = document.getElementById(detailId);
  if(!box) return;

  const setPlan = Array.isArray(ex.set_plan) && ex.set_plan.length
    ? ex.set_plan
    : [{set:1, reps:ex.repetitions||"", weight:ex.planned_weight||""}];

  const sp = setPlan[setIndex] || setPlan[0] || {};
  const setLabel = sp.set || setIndex + 1;
  const name = exerciseKeyName(ex);
  const valueKey = key(sessionIndex, section, name, setLabel);
  const notesKey = valueKey + ":notes";
  const prev = previousValue(name, setLabel, sessionIndex);
  const tempo = tempoValue(sp, ex);

box.innerHTML =
  `<div class="detail-row"><span>Target reps</span><strong>${escapeHtml(sp.reps || ex.repetitions || "")}</strong></div>` +
  `<div class="detail-row"><span>Planned weight</span><strong>${escapeHtml(sp.weight || ex.planned_weight || "")}</strong></div>` +
  (tempo ? `<div class="detail-row"><span>Tempo</span><strong>E/S/K: ${escapeHtml(tempo)}</strong></div>` : "") +
  `<div class="detail-row"><span>Actual weight</span><input data-key="${escapeHtml(valueKey)}" value="${escapeHtml(progress[valueKey] || "")}" placeholder="kg / value"></div>` +
  `<div class="detail-row"><span>Previous</span><strong>${escapeHtml(prev || "-")}</strong></div>` +
  `<input class="compact-notes" data-key="${escapeHtml(notesKey)}" value="${escapeHtml(progress[notesKey] || "")}" placeholder="Notes">`;
}

function renderExerciseRows(list,section){
  if(!list || !list.length)return `<p class="small">No ${section.replace('_',' ')} specified.</p>`;
  return `<div class="compact-exercise-grid ${section}">`+list.map((ex,idx)=>renderExerciseCard(ex,section,idx)).join("")+`</div>`;
}

function renderSession(){
  if(!flatSessions.length){document.getElementById("sessionContent").innerHTML="<p>No training data available.</p>";return;}
  const s=flatSessions[selectedIndex];
  selectedWeekIndex=s.weekIndex;
  document.getElementById("sessionTitle").textContent=(s.name || "Day")+" - "+(s.focus || "");
  document.getElementById("sessionMeta").innerHTML=
    `<span class="badge">${escapeHtml(s.type || "")}</span>`+
    `${escapeHtml(fmt(s.date))} | Month ${escapeHtml(s.month)} | Week ${escapeHtml(s.week)} | ${escapeHtml(s.phase || "")} | ${escapeHtml(s.intensity || "")}`;
  let html="";
  if(s.weekly_goal)html+=`<p class="small"><strong>Weekly goal:</strong> ${escapeHtml(s.weekly_goal)}</p>`;
  html+=`<h3 class="section-title warmup">Warm-up</h3>${renderExerciseRows(s.warmup,"warmup")}`;
  html+=`<h3 class="section-title main">Main training</h3>${renderExerciseRows(s.main_training,"main_training")}`;
  if(s.finisher && s.finisher.length)html+=`<h3 class="section-title finisher">Finisher</h3>${renderExerciseRows(s.finisher,"finisher")}`;
  html+=`<h3 class="section-title cooldown">Cool-down</h3><textarea class="cooldown-box" data-key="cooldown-${selectedIndex}" placeholder="Client can write cooldown details here">${escapeHtml(progress["cooldown-"+selectedIndex] || s.cooldown || "")}</textarea>`;
  document.getElementById("sessionContent").innerHTML=html;
}

function previousSession(){if(selectedIndex>0){selectedIndex--;selectedWeekIndex=flatSessions[selectedIndex].weekIndex;render();}}
function nextSession(){if(selectedIndex<flatSessions.length-1){selectedIndex++;selectedWeekIndex=flatSessions[selectedIndex].weekIndex;render();}}

function saveProgress(){
  document.querySelectorAll("input[data-key], textarea[data-key]").forEach(el=>{progress[el.dataset.key]=el.value;});
  localStorage.setItem("trainingProgressV3",JSON.stringify(progress));
  alert("Progress saved on this device.");
}
function clearProgress(){if(confirm("Clear all locally saved progress?")){progress={};localStorage.removeItem("trainingProgressV3");render();}}

function openMetadata(){renderMetadata();document.getElementById("metadataModal").classList.remove("hidden");}
function closeMetadata(){document.getElementById("metadataModal").classList.add("hidden");}
function renderMetadata(){
  const c=clientObject();
  const weekly=metadata.weekly_structure || [];
  document.getElementById("metadataContent").innerHTML=
    `<p><strong>Client:</strong> ${escapeHtml(clientName())}</p>`+
    `<p><strong>Age:</strong> ${escapeHtml(c.age || "")}</p>`+
    `<p><strong>Sex:</strong> ${escapeHtml(c.sex || "")}</p>`+
    `<p><strong>Height:</strong> ${escapeHtml(c.height_cm || c.height || "")}</p>`+
    `<p><strong>Weight:</strong> ${escapeHtml(c.weight_kg || c.weight || "")}</p>`+
    `<p><strong>Experience:</strong> ${escapeHtml(c.training_experience || "")}</p>`+
    `<p><strong>Health:</strong> ${escapeHtml(c.health_status || "")}</p>`+
    `<p><strong>Goal:</strong> ${escapeHtml(c.goal || metadata.goal || "")}</p>`+
    `<p><strong>Plan duration:</strong> ${escapeHtml(metadata.plan_duration || "")}</p>`+
    `<h3>Weekly structure</h3><ul>${weekly.map(x=>`<li>${escapeHtml(x)}</li>`).join("")}</ul>`+
    `<h3>Raw metadata</h3><pre>${escapeHtml(JSON.stringify(metadata,null,2))}</pre>`;
}

function openDashboard(){renderDashboard();document.getElementById("dashboardModal").classList.remove("hidden");}
function closeDashboard(){document.getElementById("dashboardModal").classList.add("hidden");}
function renderMiniChart(title,data){
  const max=Math.max(1,...data.map(d=>d.value));
  return `<div class="card"><h3>${escapeHtml(title)}</h3><div class="chart">${data.map(d=>`<div style="flex:1"><div class="bar" title="${escapeHtml(d.label)}: ${d.value}" style="height:${d.value/max*150}px"></div><div class="bar-label">${escapeHtml(d.label)}</div></div>`).join("")}</div></div>`;
}
function renderDashboard(){
  const muscles={Chest:0,Legs:0,Back:0,Arms:0,Shoulders:0,Core:0,Other:0};
  flatSessions.forEach((sess,i)=>{
    ["main_training","warmup","finisher"].forEach(section=>{
      (sess[section]||[]).forEach(ex=>{
        const group=(ex.muscle_group||"Other").toLowerCase();
        const sets=Array.isArray(ex.set_plan)?ex.set_plan.length:Number(ex.sets||1);
        const bucket=group.includes("chest")||group.includes("pector")?"Chest":group.includes("leg")||group.includes("quad")||group.includes("glute")||group.includes("hamstring")||group.includes("calf")?"Legs":group.includes("back")||group.includes("lat")?"Back":group.includes("arm")||group.includes("biceps")||group.includes("triceps")?"Arms":group.includes("shoulder")||group.includes("delt")?"Shoulders":group.includes("core")||group.includes("ab")?"Core":"Other";
        muscles[bucket]+=sets;
      });
    });
  });
  const data=Object.keys(muscles).map(k=>({label:k,value:muscles[k]}));
  document.getElementById("dashboardContent").innerHTML=`<div class="dashboard-grid">${renderMiniChart("Planned sets by muscle group",data)}</div><p class="small">This dashboard counts planned sets from the embedded YAML. Actual client progress is saved locally in the browser.</p>`;
}

function render(){renderWeekSelect();renderDayList();renderSession();}
buildFlatData();renderSubtitle();selectedIndex=todayIndex();selectedWeekIndex=flatSessions[selectedIndex]?.weekIndex || 0;render();
</script>
</body>
</html>
