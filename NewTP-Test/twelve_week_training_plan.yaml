      name: Monday
      type: Weights
      focus: Lower Body A - Squat, Glutes and Legs
      phase: Re-entry Hypertrophy
      weekly_goal: Technique, controlled movement, preparation of muscles, tendons and joints.
      intensity: 65% 1RM
      warmup:
      - exercise: Rowing Machine
        muscle_group: Full Body
        description: Row for 5-10 minutes at an easy pace to increase body temperature.
        video_url: ''
        set_plan:
