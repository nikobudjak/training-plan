        description: Begin seated on the ground with a loaded barbell over your legs. Using a fat bar or having a pad on the
          bar can greatly reduce the discomfort caused by this exercise. Roll the bar so that it is directly above your hips,
          and lay down flat on the floor. Begin the movement by driving through with your heels, extending your hips vertically
