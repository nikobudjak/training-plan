      - exercise: Dumbbell Squat
        muscle_group: quadriceps + calves + glutes + hamstrings + lower back
        description: 'Stand up straight while holding a dumbbell on each hand (palms facing the side of your legs). Position
          your legs using a shoulder width medium stance with the toes slightly pointed out. Keep your head up at all times
          as looking down will get you off balance and also maintain a straight back. This will be your starting position.
          Note: For the purposes of this discussion we will use the medium stance described above which targets overall development;
          however you can choose any of the three stances discussed in the foot stances section. Begin to slowly lower your
          torso by bending the knees as you maintain a straight posture with the head up. Continue down until your thighs
          are parallel to the floor. Tip: If you performed the exercise correctly, the front of the knees should make an imaginary
          straight line with the toes that is perpendicular to the front. If your knees are past that imaginary line (if they
          are past your toes) then you are placing undue stress on the knee and the exercise has been performed incorrectly.
          Begin to raise your torso as you exhale by pushing the floor with the heel of your foot mainly as you straighten
          the legs again and go back to the starting position. Repeat for the recommended amount of repetitions.'
        video_url: ''
        set_plan:
        - set: 1
          reps: '10'
          weight: 30-50% 1RM
          eccentric: '2'
          static: '0'
          concentric: '2'
          tempo: 2-0-2
        - set: 2
          reps: '10'
          weight: 30-50% 1RM
          eccentric: '2'
          static: '0'
          concentric: '2'
          tempo: 2-0-2
      main_training:
      - exercise: Barbell Deadlift
        muscle_group: lower back + calves + forearms + glutes + hamstrings + lats + middle back + quadriceps + traps
        description: 'Stand in front of a loaded barbell. While keeping the back as straight as possible, bend your knees,
          bend forward and grasp the bar using a medium (shoulder width) overhand grip. This will be the starting position
          of the exercise. Tip: If it is difficult to hold on to the bar with this grip, alternate your grip or use wrist
          straps. While holding the bar, start the lift by pushing with your legs while simultaneously getting your torso
          to the upright position as you breathe out. In the upright position, stick your chest out and contract the back
          by bringing the shoulder blades back. Think of how the soldiers in the military look when they are in standing in
          attention. Go back to the starting position by bending at the knees while simultaneously leaning the torso forward
          at the waist while keeping the back straight. When the weights on the bar touch the floor you are back at the starting
          position and ready to perform another repetition. Perform the amount of repetitions prescribed in the program.'
        video_url: ''
