        muscle_group: biceps + forearms
        description: Grab an EZ-bar using a shoulder width and palms down (pronated) grip. Now place the upper part of both
          arms on top of the preacher bench and have your arms extended. This will be your starting position. As you exhale,
          use the biceps to curl the weight up until your biceps are fully contracted and the barbell is at shoulder height.
