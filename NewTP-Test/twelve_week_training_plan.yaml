      - exercise: Standing Calf Raises
        muscle_group: calves
        description: Adjust the padded lever of the calf raise machine to fit your height. Place your shoulders under the
          pads provided and position your toes facing forward (or using any of the two other positions described at the beginning
          of the chapter). The balls of your feet should be secured on top of the calf block with the heels extending off
          it. Push the lever up by extending your hips and knees until your torso is standing erect. The knees should be kept
          with a slight bend; never locked. Toes should be facing forward, outwards or inwards as described at the beginning
          of the chapter. This will be your starting position. Raise your heels as you breathe out by extending your ankles
          as high as possible and flexing your calf. Ensure that the knee is kept stationary at all times. There should be
          no bending at any time. Hold the contracted position by a second before you start to go back down. Go back slowly
          to the starting position as you breathe in by lowering your heels as you bend the ankles until calves are stretched.
