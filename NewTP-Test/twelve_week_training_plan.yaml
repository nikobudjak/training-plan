          bar to the back of your neck. This is your starting position. Pull your torso up until the bar is near the back
          of your neck. To do this, draw the shoulders and upper arms down and back while slightly leaning your head forward.
          Exhale as you perform this portion of the movement. Tip: Concentrate on squeezing the back muscles once you reach
          the full contracted position. The upper torso should remain stationary as it moves through space and only the arms
          should move. The forearms should do no other work other than hold the bar. After a second on the contracted position,
