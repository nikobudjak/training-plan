        muscle_group: quadriceps
        description: 'For this exercise you will need to use a leg extension machine. First choose your weight and sit on
          the machine with your legs under the pad (feet pointed forward) and the hands holding the side bars. This will be
          your starting position. Tip: You will need to adjust the pad so that it falls on top of your lower leg (just above
          your feet). Also, make sure that your legs form a 90-degree angle between the lower and upper leg. If the angle
          is less than 90-degrees then that means the knee is over the toes which in turn creates undue stress at the knee
          joint. If the machine is designed that way, either look for another machine or just make sure that when you start
          executing the exercise you stop going down once you hit the 90-degree angle. Using your quadriceps, extend your
          legs to the maximum as you exhale. Ensure that the rest of the body remains stationary on the seat. Pause a second
          on the contracted position. Slowly lower the weight back to the original position as you inhale, ensuring that you
