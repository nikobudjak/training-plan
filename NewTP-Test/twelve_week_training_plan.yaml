      - exercise: Barbell Full Squat
        muscle_group: quadriceps + calves + glutes + hamstrings + lower back
        description: This exercise is best performed inside a squat rack for safety purposes. To begin, first set the bar
          on a rack just above shoulder level. Once the correct height is chosen and the bar is loaded, step under the bar
          and place the back of your shoulders (slightly below the neck) across it. Hold on to the bar using both arms at
          each side and lift it off the rack by first pushing with your legs and at the same time straightening your torso.
          Step away from the rack and position your legs using a shoulder-width medium stance with the toes slightly pointed
          out. Keep your head up at all times and maintain a straight back. This will be your starting position. Begin to
          slowly lower the bar by bending the knees and sitting back with your hips as you maintain a straight posture with
          the head up. Continue down until your hamstrings are on your calves. Inhale as you perform this portion of the movement.
          Begin to raise the bar as you exhale by pushing the floor with the heel or middle of your foot as you straighten
