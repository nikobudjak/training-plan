          concentric: '2'
          tempo: 2-0-2
      - exercise: Bodyweight Squat
        muscle_group: quadriceps + glutes + hamstrings
        description: Stand with your feet shoulder width apart. You can place your hands behind your head. This will be your
          starting position. Begin the movement by flexing your knees and hips, sitting back with your hips. Continue down
          to full depth if you are able,and quickly reverse the motion until you return to the starting position. As you squat,
          keep your head and chest up and push your knees out.
        video_url: ''
        set_plan:
        - set: 1
          reps: '15'
          weight: Bodyweight
          eccentric: '2'
          static: '0'
          concentric: '2'
          tempo: 2-0-2
        - set: 2
          reps: '15'
          weight: Bodyweight
          eccentric: '2'
          static: '0'
          concentric: '2'
          tempo: 2-0-2
      main_training:
      - exercise: Barbell Full Squat
        muscle_group: quadriceps + calves + glutes + hamstrings + lower back
        description: This exercise is best performed inside a squat rack for safety purposes. To begin, first set the bar
          on a rack just above shoulder level. Once the correct height is chosen and the bar is loaded, step under the bar
          and place the back of your shoulders (slightly below the neck) across it. Hold on to the bar using both arms at
          each side and lift it off the rack by first pushing with your legs and at the same time straightening your torso.
          Step away from the rack and position your legs using a shoulder-width medium stance with the toes slightly pointed
          out. Keep your head up at all times and maintain a straight back. This will be your starting position. Begin to
          slowly lower the bar by bending the knees and sitting back with your hips as you maintain a straight posture with
          the head up. Continue down until your hamstrings are on your calves. Inhale as you perform this portion of the movement.
          Begin to raise the bar as you exhale by pushing the floor with the heel or middle of your foot as you straighten
          the legs and extend the hips to go back to the starting position. Repeat for the recommended amount of repetitions.
        video_url: ''
        set_plan:
        - set: 1
          reps: 8-10
          weight: 70% 1RM
          eccentric: '3'
          static: '1'
          concentric: '1'
          tempo: 3-1-1
        - set: 2
          reps: 8-10
          weight: 70% 1RM
          eccentric: '3'
          static: '1'
          concentric: '1'
          tempo: 3-1-1
        - set: 3
          reps: 8-10
          weight: 70% 1RM
          eccentric: '3'
          static: '1'
          concentric: '1'
          tempo: 3-1-1
        - set: 4
          reps: 8-10
          weight: 70% 1RM
          eccentric: '3'
          static: '1'
          concentric: '1'
          tempo: 3-1-1
        - set: 5
          reps: 8-10
          weight: 70% 1RM
          eccentric: '3'
          static: '1'
          concentric: '1'
          tempo: 3-1-1
      - exercise: Barbell Glute Bridge
        muscle_group: glutes + calves + hamstrings
        description: Begin seated on the ground with a loaded barbell over your legs. Using a fat bar or having a pad on the
          bar can greatly reduce the discomfort caused by this exercise. Roll the bar so that it is directly above your hips,
          and lay down flat on the floor. Begin the movement by driving through with your heels, extending your hips vertically
          through the bar. Your weight should be supported by your upper back and the heels of your feet. Extend as far as
          possible, then reverse the motion to return to the starting position.
        video_url: ''
        set_plan:
        - set: 1
          reps: 8-10
          weight: 70% 1RM
          eccentric: '3'
          static: '1'
          concentric: '1'
          tempo: 3-1-1
        - set: 2
          reps: 8-10
          weight: 70% 1RM
          eccentric: '3'
          static: '1'
          concentric: '1'
          tempo: 3-1-1
        - set: 3
          reps: 8-10
          weight: 70% 1RM
          eccentric: '3'
          static: '1'
          concentric: '1'
          tempo: 3-1-1
        - set: 4
          reps: 8-10
          weight: 70% 1RM
          eccentric: '3'
          static: '1'
          concentric: '1'
          tempo: 3-1-1
      - exercise: Leg Extensions
        muscle_group: quadriceps
        description: 'For this exercise you will need to use a leg extension machine. First choose your weight and sit on
          the machine with your legs under the pad (feet pointed forward) and the hands holding the side bars. This will be
          your starting position. Tip: You will need to adjust the pad so that it falls on top of your lower leg (just above
          your feet). Also, make sure that your legs form a 90-degree angle between the lower and upper leg. If the angle
          is less than 90-degrees then that means the knee is over the toes which in turn creates undue stress at the knee
          joint. If the machine is designed that way, either look for another machine or just make sure that when you start
          executing the exercise you stop going down once you hit the 90-degree angle. Using your quadriceps, extend your
          legs to the maximum as you exhale. Ensure that the rest of the body remains stationary on the seat. Pause a second
          on the contracted position. Slowly lower the weight back to the original position as you inhale, ensuring that you
          do not go past the 90-degree angle limit. Repeat for the recommended amount of times.'
        video_url: ''
        set_plan:
        - set: 1
          reps: 12-15
          weight: 65% 1RM
          eccentric: '2'
          static: '1'
          concentric: '2'
          tempo: 2-1-2
        - set: 2
          reps: 12-15
          weight: 65% 1RM
          eccentric: '2'
          static: '1'
          concentric: '2'
          tempo: 2-1-2
        - set: 3
          reps: 12-15
          weight: 65% 1RM
          eccentric: '2'
          static: '1'
          concentric: '2'
          tempo: 2-1-2
      - exercise: Seated Leg Curl
        muscle_group: hamstrings
        description: Adjust the machine lever to fit your height and sit on the machine with your back against the back support
          pad. Place the back of lower leg on top of padded lever (just a few inches under the calves) and secure the lap
          pad against your thighs, just above the knees. Then grasp the side handles on the machine as you point your toes
          straight (or you can also use any of the other two stances) and ensure that the legs are fully straight right in
          front of you. This will be your starting position. As you exhale, pull the machine lever as far as possible to the
          back of your thighs by flexing at the knees. Keep your torso stationary at all times. Hold the contracted position
          for a second. Slowly return to the starting position as you breathe in. Repeat for the recommended amount of repetitions.
        video_url: ''
        set_plan:
        - set: 1
          reps: 12-15
          weight: 65% 1RM
          eccentric: '2'
          static: '1'
          concentric: '2'
          tempo: 2-1-2
        - set: 2
          reps: 12-15
          weight: 65% 1RM
          eccentric: '2'
          static: '1'
          concentric: '2'
          tempo: 2-1-2
        - set: 3
          reps: 12-15
          weight: 65% 1RM
          eccentric: '2'
          static: '1'
          concentric: '2'
          tempo: 2-1-2
      - exercise: Standing Calf Raises
        muscle_group: calves
        description: Adjust the padded lever of the calf raise machine to fit your height. Place your shoulders under the
          pads provided and position your toes facing forward (or using any of the two other positions described at the beginning
          of the chapter). The balls of your feet should be secured on top of the calf block with the heels extending off
          it. Push the lever up by extending your hips and knees until your torso is standing erect. The knees should be kept
          with a slight bend; never locked. Toes should be facing forward, outwards or inwards as described at the beginning
          of the chapter. This will be your starting position. Raise your heels as you breathe out by extending your ankles
          as high as possible and flexing your calf. Ensure that the knee is kept stationary at all times. There should be
          no bending at any time. Hold the contracted position by a second before you start to go back down. Go back slowly
          to the starting position as you breathe in by lowering your heels as you bend the ankles until calves are stretched.
          Repeat for the recommended amount of repetitions.
        video_url: ''
        set_plan:
        - set: 1
          reps: 12-15
          weight: 70% 1RM
          eccentric: '2'
          static: '1'
          concentric: '2'
          tempo: 2-1-2
        - set: 2
          reps: 12-15
          weight: 70% 1RM
          eccentric: '2'
          static: '1'
          concentric: '2'
          tempo: 2-1-2
        - set: 3
          reps: 12-15
          weight: 70% 1RM
          eccentric: '2'
          static: '1'
          concentric: '2'
          tempo: 2-1-2
        - set: 4
          reps: 12-15
          weight: 70% 1RM
          eccentric: '2'
          static: '1'
          concentric: '2'
          tempo: 2-1-2
      finisher:
      - exercise: Barbell Lunge
        muscle_group: quadriceps + calves + glutes + hamstrings
        description: 'This exercise is best performed inside a squat rack for safety purposes. To begin, first set the bar
          on a rack just below shoulder level. Once the correct height is chosen and the bar is loaded, step under the bar
          and place the back of your shoulders (slightly below the neck) across it. Hold on to the bar using both arms at
          each side and lift it off the rack by first pushing with your legs and at the same time straightening your torso.
          Step away from the rack and step forward with your right leg and squat down through your hips, while keeping the
          torso upright and maintaining balance. Inhale as you go down. Note: Do not allow your knee to go forward beyond
          your toes as you come down, as this will put undue stress on the knee joint. li> Using mainly the heel of your foot,
          push up and go back to the starting position as you exhale. Repeat the movement for the recommended amount of repetitions
          and then perform with the left leg.'
        video_url: ''
        set_plan:
        - set: 1
          reps: 12 each leg
          weight: Bodyweight or light load
          eccentric: '2'
          static: '0'
          concentric: '2'
          tempo: 2-0-2
        - set: 2
          reps: 12 each leg
          weight: Bodyweight or light load
          eccentric: '2'
          static: '0'
          concentric: '2'
          tempo: 2-0-2
      - exercise: Plank
        muscle_group: abdominals
        description: Get into a prone position on the floor, supporting your weight on your toes and your forearms. Your arms
          are bent and directly below the shoulder. Keep your body straight at all times, and hold this position as long as
          possible. To increase difficulty, an arm or leg can be raised.
        video_url: ''
        set_plan:
        - set: 1
          reps: 30-60 sec
          weight: Bodyweight
          eccentric: ''
          static: 30-60
          concentric: ''
          tempo: ''
        - set: 2
          reps: 30-60 sec
          weight: Bodyweight
          eccentric: ''
          static: 30-60
          concentric: ''
          tempo: ''
      cooldown: 'Cool-down on a mat: light stretching and breathing for 5-10 minutes.'
    - date: '2026-06-23'
      name: Tuesday
      type: Weights
      focus: Upper Body A - Chest and Triceps Emphasis
      phase: Re-entry Hypertrophy
      weekly_goal: Technique, controlled movement, preparation of muscles, tendons and joints.
      intensity: 65% 1RM
      warmup:
      - exercise: Rowing, Stationary
        muscle_group: quadriceps + biceps + calves + glutes + hamstrings + lower back + middle back
        description: To begin, seat yourself on the rower. Make sure that your heels are resting comfortably against the base
          of the foot pedals and that the straps are secured. Select the program that you wish to use, if applicable. Sit
          up straight and bend forward at the hips. There are three phases of movement when using a rower. The first phase
          is when you come forward on the rower. Your knees are bent and against your chest. Your upper body is leaning slightly
          forward while still maintaining good posture. Next, push against the foot pedals and extend your legs while bringing
          your hands to your upper abdominal area, squeezing your shoulders back as you do so. To avoid straining your back,
          use primarily your leg and hip muscles. The recovery phase simply involves straightening your arms, bending the
          knees, and bringing your body forward again as you transition back into the first phase.
        video_url: ''
        set_plan:
        - set: 1
          reps: ~5 min
          weight: ''
          eccentric: ''
          static: ''
          concentric: ''
          tempo: ''
      - exercise: Band Pull Apart
        muscle_group: Shoulders + Upper Back + Rear Deltoids
        description: Hold a resistance band in front of your chest with both hands. Keep your arms almost straight. Pull the
          band apart until your hands move out to the sides. Squeeze your shoulder blades together. Return slowly to the starting
          position.
        video_url: ''
        set_plan:
        - set: 1
          reps: '15'
          weight: Light Band
          eccentric: '2'
          static: '0'
          concentric: '2'
          tempo: 2-0-2
        - set: 2
          reps: '15'
          weight: Light Band
          eccentric: '2'
          static: '0'
          concentric: '2'
          tempo: 2-0-2
      - exercise: Arm Circles
        muscle_group: Shoulders + Upper Back
        description: Stand tall with your arms extended to the sides. Move your arms in small controlled circles. Gradually
          increase the circle size. Repeat in the opposite direction.
        video_url: ''
        set_plan:
        - set: 1
          reps: 10 each direction
          weight: Bodyweight
          eccentric: '2'
          static: '0'
          concentric: '2'
          tempo: 2-0-2
      - exercise: Clock Push-Up
        muscle_group: chest + shoulders + triceps
        description: Move into a prone position on the floor, supporting your weight on your hands and toes. Your arms should
          be fully extended with the hands around shoulder width. Keep your body straight throughout the movement. This will
          be your starting position. Descend by flexing at the elbow, lowering your chest toward the ground. At the bottom,
          reverse the motion by pushing yourself up through elbow extension as quickly as possible until you are air borne.
          Aim to "jump" 12-18 inches to one side. As you accelerate up, move your outside foot away from your direction of
          travel. Leaving the ground, shift your body about 30 degrees for the next repetition. Return to the starting position
          and repeat the exercise, working all the way around until you are back where you started.
        video_url: ''
        set_plan:
        - set: 1
          reps: '10'
          weight: Bodyweight
          eccentric: '2'
          static: '0'
          concentric: '2'
          tempo: 2-0-2
      main_training:
      - exercise: Barbell Bench Press
        muscle_group: Chest + Triceps + Front Deltoids
        description: Lie on a flat bench with your feet firmly on the floor. Grip the bar slightly wider than shoulder width.
          Lower the bar under control to the middle of your chest. Press the bar upward until your arms are extended. Keep
          your shoulder blades retracted during the movement.
        video_url: ''
        set_plan:
        - set: 1
          reps: 8-10
          weight: 70% 1RM
          eccentric: '3'
          static: '1'
          concentric: '1'
          tempo: 3-1-1
        - set: 2
          reps: 8-10
          weight: 70% 1RM
          eccentric: '3'
          static: '1'
          concentric: '1'
          tempo: 3-1-1
        - set: 3
          reps: 8-10
          weight: 70% 1RM
          eccentric: '3'
          static: '1'
          concentric: '1'
          tempo: 3-1-1
        - set: 4
          reps: 8-10
          weight: 70% 1RM
          eccentric: '3'
          static: '1'
          concentric: '1'
          tempo: 3-1-1
      - exercise: Wide-Grip Rear Pull-Up
        muscle_group: lats + biceps + middle back + shoulders
        description: 'Grab the pull-up bar with the palms facing forward using a wide grip. As you have both arms extended
          in front of you holding the bar, bring your torso forward and head so that there is an imaginary line from the pull-up
          bar to the back of your neck. This is your starting position. Pull your torso up until the bar is near the back
          of your neck. To do this, draw the shoulders and upper arms down and back while slightly leaning your head forward.
          Exhale as you perform this portion of the movement. Tip: Concentrate on squeezing the back muscles once you reach
          the full contracted position. The upper torso should remain stationary as it moves through space and only the arms
          should move. The forearms should do no other work other than hold the bar. After a second on the contracted position,
          start to inhale and slowly lower your torso back to the starting position when your arms are fully extended and
          the lats are fully stretched. Repeat this motion for the prescribed amount of repetitions.'
        video_url: ''
        set_plan:
        - set: 1
          reps: 8-10
          weight: Bodyweight
          eccentric: '3'
          static: '1'
          concentric: '1'
          tempo: 3-1-1
        - set: 2
          reps: 8-10
          weight: Bodyweight
          eccentric: '3'
          static: '1'
          concentric: '1'
          tempo: 3-1-1
        - set: 3
          reps: 8-10
          weight: Bodyweight
          eccentric: '3'
          static: '1'
          concentric: '1'
          tempo: 3-1-1
      - exercise: Dumbbell Incline Bench Press
        muscle_group: Chest + Triceps + Front Deltoids
        description: Set the bench to a moderate incline. Hold one dumbbell in each hand at chest level. Press the dumbbells
          upward until your arms are extended. Lower them slowly back to chest level. Keep the movement controlled and avoid
          arching excessively.
        video_url: ''
        set_plan:
        - set: 1
          reps: 10-12
          weight: 65% 1RM
          eccentric: '3'
          static: '1'
          concentric: '1'
          tempo: 3-1-1
        - set: 2
          reps: 10-12
          weight: 65% 1RM
          eccentric: '3'
          static: '1'
          concentric: '1'
          tempo: 3-1-1
        - set: 3
          reps: 10-12
          weight: 65% 1RM
          eccentric: '3'
          static: '1'
          concentric: '1'
          tempo: 3-1-1
      - exercise: Cable Seated Row
        muscle_group: Back + Biceps + Rear Deltoids
        description: Sit at the cable row machine with your feet placed securely. Hold the handle with both hands. Pull the
          handle toward your lower ribs. Squeeze your shoulder blades together. Return slowly until your arms are extended.
        video_url: ''
        set_plan:
        - set: 1
          reps: 10-12
          weight: 70% 1RM
          eccentric: '3'
          static: '1'
          concentric: '1'
          tempo: 3-1-1
        - set: 2
          reps: 10-12
          weight: 70% 1RM
          eccentric: '3'
          static: '1'
          concentric: '1'
          tempo: 3-1-1
        - set: 3
          reps: 10-12
          weight: 70% 1RM
          eccentric: '3'
          static: '1'
          concentric: '1'
          tempo: 3-1-1
      - exercise: Cable Pushdown
        muscle_group: Triceps
        description: Stand in front of a high cable pulley. Hold the bar or rope with your elbows close to your body. Push
          the handle downward until your elbows are extended. Pause briefly and squeeze the triceps. Return slowly without
          letting the elbows move forward.
        video_url: ''
        set_plan:
        - set: 1
          reps: 12-15
          weight: 65% 1RM
          eccentric: '2'
          static: '1'
          concentric: '2'
          tempo: 2-1-2
        - set: 2
          reps: 12-15
          weight: 65% 1RM
          eccentric: '2'
          static: '1'
          concentric: '2'
          tempo: 2-1-2
        - set: 3
          reps: 12-15
          weight: 65% 1RM
          eccentric: '2'
          static: '1'
          concentric: '2'
          tempo: 2-1-2
      - exercise: Barbell Curl
        muscle_group: Biceps + Forearms
        description: Stand tall holding a barbell with an underhand grip. Keep your elbows close to your sides. Curl the bar
          upward toward your chest. Squeeze the biceps at the top. Lower the bar slowly back to the starting position.
        video_url: ''
        set_plan:
        - set: 1
          reps: 12-15
          weight: 65% 1RM
          eccentric: '2'
          static: '1'
          concentric: '2'
          tempo: 2-1-2
        - set: 2
          reps: 12-15
          weight: 65% 1RM
          eccentric: '2'
          static: '1'
          concentric: '2'
          tempo: 2-1-2
        - set: 3
          reps: 12-15
          weight: 65% 1RM
          eccentric: '2'
          static: '1'
          concentric: '2'
          tempo: 2-1-2
      finisher:
      - exercise: Dips - Chest Version
        muscle_group: chest + shoulders + triceps
        description: 'For this exercise you will need access to parallel bars. To get yourself into the starting position,
          hold your body at arms length (arms locked) above the bars. While breathing in, lower yourself slowly with your
          torso leaning forward around 30 degrees or so and your elbows flared out slightly until you feel a slight stretch
          in the chest. Once you feel the stretch, use your chest to bring your body back to the starting position as you
          breathe out. Tip: Remember to squeeze the chest at the top of the movement for a second. Repeat the movement for
          the prescribed amount of repetitions.'
        video_url: ''
        set_plan:
        - set: 1
          reps: AMRAP
          weight: Bodyweight
          eccentric: '2'
          static: '0'
          concentric: '2'
          tempo: 2-0-2
        - set: 2
          reps: AMRAP
          weight: Bodyweight
          eccentric: '2'
          static: '0'
          concentric: '2'
          tempo: 2-0-2
      cooldown: 'Cool-down on a mat: light stretching and breathing for 5-10 minutes.'
